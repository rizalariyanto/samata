<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samata Village - Hunian Modern Gowa</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.15); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-fadeIn { animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slideUp { animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-slowZoom { animation: slowZoom 30s linear infinite alternate; }
        .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
        .shadow-3xl { box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Komponen Ikon SVG (Pengganti Lucide React CDN untuk Stabilitas)
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Home = (props) => <Icon {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
        const Users = (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const Building2 = (props) => <Icon {...props}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Icon>;
        const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></Icon>;
        const Mail = (props) => <Icon {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
        const Instagram = (props) => <Icon {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></Icon>;
        const Facebook = (props) => <Icon {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></Icon>;
        const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const Award = (props) => <Icon {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const MessageSquare = (props) => <Icon {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
        const Calendar = (props) => <Icon {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const Globe = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></Icon>;

        const App = () => {
            const [activePage, setActivePage] = useState('home');
            const [selectedProject, setSelectedProject] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [formStatus, setFormStatus] = useState(null);

            const projectData = [
                { 
                    id: 1,
                    title: "Samata Gardenia", 
                    loc: "Samata, Gowa", 
                    price: "Rp 1.2M - 2.5M", 
                    img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80",
                    badge: "Laku Keras",
                    desc: "Hunian modern dengan konsep vertical garden yang menyejukkan. Cocok untuk keluarga muda yang dinamis.",
                    specs: { lt: "120m²", lb: "150m²", km: "3+1", kt: "3" }
                },
                { 
                    id: 2,
                    title: "Samata Riverside", 
                    loc: "Somba Opu, Gowa", 
                    price: "Rp 2.8M - 4.2M", 
                    img: "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?auto=format&fit=crop&w=1200&q=80",
                    badge: "Luxury",
                    desc: "Nikmati pemandangan sungai alami setiap hari. Desain arsitektur tropis modern yang memaksimalkan sirkulasi udara.",
                    specs: { lt: "250m²", lb: "300m²", km: "4+1", kt: "4" }
                },
                { 
                    id: 3,
                    title: "Samata Sky Residence", 
                    loc: "Hertasning Baru, Gowa", 
                    price: "Rp 3.5M - 7.0M", 
                    img: "https://images.unsplash.com/photo-1600566753190-17f0bb2a6c3e?auto=format&fit=crop&w=1200&q=80",
                    badge: "Terbaru",
                    desc: "Apartemen low-rise eksklusif di kawasan berkembang dengan fasilitas private lift dan sky garden.",
                    specs: { lt: "180m²", lb: "180m²", km: "3+1", kt: "3" }
                }
            ];

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigateTo = (page, data = null) => {
                setActivePage(page);
                setSelectedProject(data);
                setIsMenuOpen(false);
                setFormStatus(null);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setFormStatus('sending');
                setTimeout(() => setFormStatus('success'), 1500);
            };

            const Navbar = () => (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-xl py-3 border-b border-emerald-100' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-4 md:px-6 flex justify-between items-center">
                        <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => navigateTo('home')}>
                            <div className="bg-emerald-700 p-2 rounded-xl shadow-lg group-hover:rotate-12 transition-transform">
                                <Home className="text-white w-6 h-6" />
                            </div>
                            <span className={`text-2xl font-black tracking-tighter ${scrolled ? 'text-emerald-950' : 'text-white drop-shadow-md'}`}>
                                SAMATA<span className={scrolled ? 'text-emerald-600' : 'text-emerald-400'}>VILLAGE</span>
                            </span>
                        </div>

                        <div className="hidden lg:flex items-center space-x-10">
                            {[
                                { id: 'home', label: 'Beranda' },
                                { id: 'projects', label: 'Proyek' },
                                { id: 'management', label: 'Profil' },
                                { id: 'news', label: 'Berita' },
                                { id: 'contact', label: 'Hubungi' }
                            ].map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => navigateTo(item.id)}
                                    className={`text-sm uppercase tracking-widest font-black transition-all hover:scale-105 ${
                                        activePage === item.id 
                                            ? (scrolled ? 'text-emerald-700 border-b-2 border-emerald-700' : 'text-emerald-400') 
                                            : (scrolled ? 'text-gray-600 hover:text-emerald-700' : 'text-white/80 hover:text-white drop-shadow-sm')
                                    }`}
                                >
                                    {item.label}
                                </button>
                            ))}
                            <button 
                                onClick={() => navigateTo('contact')}
                                className={`px-6 py-3 rounded-full font-black text-sm uppercase tracking-wider transition-all shadow-xl active:scale-95 ${
                                    scrolled ? 'bg-emerald-700 text-white hover:bg-emerald-800' : 'bg-white text-emerald-900 hover:bg-emerald-50'
                                }`}
                            >
                                Konsultasi
                            </button>
                        </div>

                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className={`lg:hidden p-2 rounded-xl ${scrolled ? 'text-emerald-900 bg-emerald-50' : 'text-white bg-black/20'}`}>
                            {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                        </button>
                    </div>

                    {isMenuOpen && (
                        <div className="lg:hidden bg-white fixed inset-0 z-[60] flex flex-col p-6 animate-fadeIn">
                            <div className="flex justify-between items-center mb-12">
                                <span className="text-2xl font-black text-emerald-900">MENU</span>
                                <button onClick={() => setIsMenuOpen(false)} className="p-3 bg-gray-100 rounded-full"><X size={32} /></button>
                            </div>
                            <div className="flex flex-col space-y-6">
                                {['home', 'projects', 'management', 'news', 'contact'].map((item) => (
                                    <button 
                                        key={item} 
                                        onClick={() => navigateTo(item)} 
                                        className={`text-3xl font-black text-left uppercase ${activePage === item ? 'text-emerald-600' : 'text-gray-900'}`}
                                    >
                                        {item === 'home' ? 'Beranda' : item === 'projects' ? 'Proyek' : item === 'management' ? 'Manajemen' : item === 'news' ? 'Berita' : 'Hubungi'}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => navigateTo('contact')} className="mt-auto w-full bg-emerald-700 text-white py-6 rounded-2xl font-black text-xl shadow-2xl">
                                HUBUNGI SALES
                            </button>
                        </div>
                    )}
                </nav>
            );

            const Footer = () => (
                <footer className="bg-emerald-950 text-white pt-24 pb-12">
                    <div className="container mx-auto px-4 md:px-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-16 mb-20">
                            <div className="space-y-8">
                                <div className="flex items-center space-x-3">
                                    <div className="bg-emerald-600 p-2 rounded-lg"><Home className="text-white" /></div>
                                    <span className="text-2xl font-black tracking-tighter">SAMATA<span className="text-emerald-400">VILLAGE</span></span>
                                </div>
                                <p className="text-emerald-100/60 leading-relaxed font-medium">
                                    Pelopor hunian eksklusif di Gowa dengan komitmen pada kualitas bangunan dan keharmonisan alam.
                                </p>
                                <div className="flex space-x-4">
                                    {[Facebook, Instagram, Mail].map((IconComponent, i) => (
                                        <a key={i} href="#" className="w-12 h-12 rounded-2xl bg-emerald-900 flex items-center justify-center hover:bg-emerald-500 transition-all border border-emerald-800">
                                            <IconComponent size={20} />
                                        </a>
                                    ))}
                                </div>
                            </div>
                            
                            <div>
                                <h4 className="text-emerald-400 font-black mb-8 uppercase tracking-[0.2em] text-sm">Navigasi Cepat</h4>
                                <ul className="space-y-4 font-bold text-emerald-100/80">
                                    <li><button onClick={() => navigateTo('home')} className="hover:text-white transition-colors">Beranda Utama</button></li>
                                    <li><button onClick={() => navigateTo('projects')} className="hover:text-white transition-colors">Katalog Proyek</button></li>
                                    <li><button onClick={() => navigateTo('management')} className="hover:text-white transition-colors">Struktur Manajemen</button></li>
                                    <li><button onClick={() => navigateTo('news')} className="hover:text-white transition-colors">Berita Terkini</button></li>
                                </ul>
                            </div>

                            <div>
                                <h4 className="text-emerald-400 font-black mb-8 uppercase tracking-[0.2em] text-sm">Kontak Kami</h4>
                                <ul className="space-y-6">
                                    <li className="flex items-start space-x-4">
                                        <MapPin className="text-emerald-500 mt-1 shrink-0" size={20} />
                                        <span className="text-emerald-100/80 font-bold">Samata, Gowa, Sulawesi Selatan, Indonesia</span>
                                    </li>
                                    <li className="flex items-center space-x-4">
                                        <Phone className="text-emerald-500 shrink-0" size={20} />
                                        <span className="text-emerald-100/80 font-bold">0852-4260-3151</span>
                                    </li>
                                </ul>
                            </div>

                            <div className="bg-emerald-900/50 p-8 rounded-[2rem] border border-emerald-800">
                                <h4 className="text-white font-black mb-4">Newsletter</h4>
                                <p className="text-emerald-200/60 text-sm mb-6 font-bold">Dapatkan penawaran unit terbaru langsung di email Anda.</p>
                                <div className="relative">
                                    <input type="email" placeholder="Email Anda" className="w-full bg-emerald-950 border-none rounded-xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 text-white font-bold outline-none" />
                                    <button className="absolute right-2 top-2 bg-emerald-600 p-2 rounded-lg text-white hover:bg-emerald-500 transition-colors">
                                        <ArrowRight size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="border-t border-emerald-900 pt-10 text-center">
                            <p className="text-emerald-500 font-black text-xs uppercase tracking-widest">
                                © 2024 Samata Village Property. All Rights Reserved. Built for Excellence.
                            </p>
                        </div>
                    </div>
                </footer>
            );

            const HomePage = () => (
                <div className="animate-fadeIn">
                    <section className="relative min-h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute inset-0 bg-gradient-to-b from-black/70 via-black/40 to-white z-10" />
                            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80" alt="Hero" className="w-full h-full object-cover animate-slowZoom" />
                        </div>
                        <div className="container mx-auto px-4 relative z-20 text-center text-white">
                            <span className="inline-block bg-emerald-600/20 backdrop-blur-md border border-emerald-400/30 px-6 py-2 rounded-full text-sm font-black tracking-[0.3em] uppercase mb-8 animate-slideUp">
                                The Future of Living
                            </span>
                            <h1 className="text-6xl md:text-9xl font-black mb-8 leading-none tracking-tighter animate-slideUp">
                                Seni <span className="text-emerald-400">Hunian</span><br />Modern.
                            </h1>
                            <p className="text-xl md:text-3xl text-emerald-50 font-medium mb-12 max-w-3xl mx-auto opacity-90 animate-slideUp">
                                Membangun masa depan keluarga Anda dengan kenyamanan tanpa batas di lokasi paling strategis.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-6 justify-center animate-slideUp">
                                <button onClick={() => navigateTo('projects')} className="bg-emerald-600 text-white px-12 py-6 rounded-2xl font-black text-xl hover:bg-emerald-500 transition-all shadow-2xl hover:-translate-y-2">
                                    LIHAT UNIT
                                </button>
                                <button onClick={() => navigateTo('contact')} className="bg-white/10 backdrop-blur-md border-2 border-white/30 text-white px-12 py-6 rounded-2xl font-black text-xl hover:bg-white/20 transition-all">
                                    KONSULTASI
                                </button>
                            </div>
                        </div>
                    </section>

                    <section className="py-24 bg-white">
                        <div className="container mx-auto px-4 text-center">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                {[
                                    { label: 'Proyek Selesai', val: '12+', icon: <Building2 /> },
                                    { label: 'Keluarga Bahagia', val: '450+', icon: <Users /> },
                                    { label: 'Penghargaan', val: '08', icon: <Award /> },
                                    { label: 'Tahun Pengalaman', val: '10+', icon: <Clock /> }
                                ].map((stat, i) => (
                                    <div key={i} className="text-center p-8 rounded-[3rem] bg-emerald-50 border border-emerald-100">
                                        <div className="text-emerald-700 mb-4 flex justify-center">{stat.icon}</div>
                                        <div className="text-4xl font-black text-emerald-900 mb-2">{stat.val}</div>
                                        <div className="text-emerald-600 font-black text-xs uppercase tracking-widest">{stat.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="py-32 bg-gray-50">
                        <div className="container mx-auto px-4 text-center text-emerald-950">
                            <h2 className="text-emerald-800 font-black tracking-[0.3em] uppercase mb-6">Signature Works</h2>
                            <h3 className="text-5xl md:text-7xl font-black mb-20 tracking-tighter">Proyek Unggulan Kami</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                {projectData.map((p) => (
                                    <div key={p.id} className="group bg-white rounded-[3rem] overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-500 flex flex-col">
                                        <div className="h-80 overflow-hidden relative">
                                            <img src={p.img} alt={p.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
                                            <div className="absolute top-6 right-6 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full text-xs font-black text-emerald-800 uppercase shadow-lg">
                                                {p.badge}
                                            </div>
                                        </div>
                                        <div className="p-10 text-left flex-grow">
                                            <h4 className="text-3xl font-black text-emerald-950 mb-2">{p.title}</h4>
                                            <div className="flex items-center text-emerald-600 font-bold mb-6 italic">
                                                <MapPin size={18} className="mr-2" /> {p.loc}
                                            </div>
                                            <p className="text-gray-500 font-bold mb-8 line-clamp-2">{p.desc}</p>
                                            <button onClick={() => navigateTo('project-detail', p)} className="w-full py-5 bg-emerald-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-emerald-700 transition-all">
                                                Lihat Detail
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );

            const ProjectDetailPage = () => (
                <div className="animate-fadeIn pt-40 pb-32 bg-white text-emerald-950">
                    <div className="container mx-auto px-4 md:px-6">
                        <button onClick={() => navigateTo('projects')} className="flex items-center text-emerald-800 font-black mb-12 hover:-translate-x-2 transition-transform text-lg group">
                            <div className="bg-emerald-50 p-3 rounded-full mr-4 group-hover:bg-emerald-100"><ArrowRight className="rotate-180" /></div> Kembali ke Katalog
                        </button>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-24 items-start">
                            <div className="rounded-[4rem] overflow-hidden shadow-3xl ring-[16px] ring-gray-50">
                                <img src={selectedProject?.img} alt={selectedProject?.title} className="w-full h-[600px] object-cover" />
                            </div>
                            <div className="space-y-12">
                                <div>
                                    <span className="bg-emerald-100 text-emerald-800 px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest mb-6 inline-block">Unit Premium</span>
                                    <h2 className="text-7xl font-black leading-none tracking-tighter mb-6">{selectedProject?.title}</h2>
                                    <p className="text-3xl font-black text-emerald-600 italic">Mulai dari {selectedProject?.price}</p>
                                </div>
                                <p className="text-2xl text-gray-600 font-medium leading-relaxed border-l-8 border-emerald-500 pl-8 py-4">{selectedProject?.desc}</p>
                                <div className="grid grid-cols-2 gap-6">
                                    {[
                                        { label: 'Luas Tanah', val: selectedProject?.specs.lt },
                                        { label: 'Luas Bangunan', val: selectedProject?.specs.lb },
                                        { label: 'Kamar Tidur', val: selectedProject?.specs.kt },
                                        { label: 'Kamar Mandi', val: selectedProject?.specs.km },
                                    ].map((spec, i) => (
                                        <div key={i} className="p-8 bg-emerald-50 rounded-[2.5rem] border border-emerald-100">
                                            <p className="text-emerald-500 font-black text-xs uppercase tracking-widest mb-2">{spec.label}</p>
                                            <p className="text-3xl font-black text-emerald-900">{spec.val}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="pt-8 flex flex-col sm:flex-row gap-6">
                                    <button onClick={() => navigateTo('contact')} className="flex-1 bg-emerald-700 text-white py-6 rounded-[2rem] font-black text-2xl shadow-2xl hover:bg-emerald-800 transition-all active:scale-95">BOOKING SEKARANG</button>
